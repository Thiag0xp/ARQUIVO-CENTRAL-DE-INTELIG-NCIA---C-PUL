<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE ARQUIVOS - PC</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    [ ARQUIVO CENTRAL DE INTELIGÊNCIA - CÚPULA ]
</header>

<nav class="abas-sistema">
    <button onclick="mudarAba('membros')" id="btn-membros" class="active">MEMBROS DA CÚPULA</button>
    <button onclick="mudarAba('provas')" id="btn-provas">ARQUIVO DE PROVAS</button>
</nav>

<div class="container">
    <div id="aba-membros" class="aba-content active">
        <div id="gridMembros" class="grid"></div>
    </div>

    <div id="aba-provas" class="aba-content">
        <div id="gridProvas" class="grid"></div>
    </div>
</div>

<div id="zoomModal" onclick="fecharVisualizador()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="conteudoVisualizador"></div>
        <p style="color: #666; font-size: 10px; margin-top: 15px; text-align:center;">CLIQUE FORA PARA FECHAR O ARQUIVO</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
